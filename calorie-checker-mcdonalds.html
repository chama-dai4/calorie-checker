<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<meta name="supported-color-schemes" content="light">
<meta name="theme-color" content="#ffffff">
<meta name="description" content="マクドナルドのメニューを選ぶだけで、合計カロリー・たんぱく質・脂質・炭水化物が分かります。バーガー、サイドメニュー、ドリンク、マックカフェのすべてに対応。">
<title>マクドナルドのカロリー計算 | カロリーチェッカー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: light only;
    --bg: #ffffff;
    --bg-alt: #fafafa;
    --ink: #0a0a0a;
    --muted: #6b6b6b;
    --line: #e8e8e8;
    --line-strong: #d4d4d4;
    --accent-soft: #f4f4f4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html {
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    background: #ffffff;
    color-scheme: light only;
  }
  body {
    background: #ffffff;
    color: #0a0a0a;
    font-family: 'Noto Sans JP', 'Inter', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    line-height: 1.5;
    letter-spacing: 0.01em;
  }
  a { color: inherit; text-decoration: none; }

  /* ===== Top nav ===== */
  .topnav {
    border-bottom: 1px solid var(--line);
    padding: 14px 0;
    position: sticky;
    top: 0;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    z-index: 50;
  }
  .topnav-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .brand {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.04em;
  }
  .other-chains-link {
    font-size: 12px;
    color: var(--muted);
    border: 1px solid var(--line-strong);
    padding: 5px 12px;
    border-radius: 4px;
    transition: all 0.15s;
  }
  .other-chains-link:hover {
    border-color: var(--ink);
    color: var(--ink);
  }

  /* ===== Layout ===== */
  .wrapper {
    max-width: 1200px;
    margin: 0 auto;
    padding: 28px 24px 0;
  }
  @media (max-width: 760px) {
    .wrapper { padding: 20px 20px 0; }
  }

  /* ===== Header ===== */
  .header {
    margin-bottom: 28px;
  }
  .breadcrumb {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .breadcrumb a { color: var(--muted); }
  .breadcrumb a:hover { color: var(--ink); }
  .breadcrumb .sep { margin: 0 6px; opacity: 0.5; }
  h1 {
    font-weight: 700;
    font-size: 32px;
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 14px;
    color: var(--muted);
  }
  @media (max-width: 760px) {
    h1 { font-size: 26px; }
    .subtitle { font-size: 13px; }
  }

  /* ===== Main layout - 2 column on PC ===== */
  .main-layout {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 40px;
    align-items: start;
    padding-bottom: 60px;
  }
  @media (max-width: 900px) {
    .main-layout {
      grid-template-columns: 1fr;
      gap: 0;
      padding-bottom: 220px; /* スマホはモバイル合計バー分の余白 */
    }
  }

  .left-col { min-width: 0; }
  .right-col { position: sticky; top: 80px; }
  @media (max-width: 900px) {
    .right-col { display: none; } /* スマホでは下部固定バーに */
  }

  /* ===== Genre tabs ===== */
  .genre-bar {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--line);
    margin-bottom: 18px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .genre-bar::-webkit-scrollbar { display: none; }
  .genre-tab {
    flex: 0 0 auto;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 10px 16px 12px;
    font-family: inherit;
    font-weight: 500;
    font-size: 13px;
    cursor: pointer;
    color: var(--muted);
    white-space: nowrap;
    transition: all 0.15s;
    margin-bottom: -1px;
  }
  .genre-tab:first-child { padding-left: 0; }
  .genre-tab:hover { color: var(--ink); }
  .genre-tab.active {
    color: var(--ink);
    font-weight: 600;
    border-bottom-color: var(--ink);
  }
  .genre-tab .num {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    margin-left: 5px;
    color: var(--muted);
    font-weight: 400;
  }

  /* ===== Search ===== */
  .search-wrap {
    margin-bottom: 16px;
    position: relative;
  }
  .search-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--line-strong);
    border-radius: 6px;
    padding: 10px 14px 10px 36px;
    font-family: inherit;
    font-size: 13px;
    color: var(--ink);
    transition: border-color 0.15s;
  }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { outline: none; border-color: var(--ink); }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 14px; height: 14px;
    color: var(--muted);
  }

  /* ===== Menu list ===== */
  .menu-stack {
    display: flex;
    flex-direction: column;
    border-top: 1px solid var(--line);
  }
  .menu-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 4px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    transition: background 0.12s;
    gap: 12px;
  }
  .menu-row:hover { background: var(--bg-alt); }
  .menu-row.selected { background: var(--accent-soft); }
  .menu-row .info { flex: 1; min-width: 0; }
  .menu-row .name {
    font-weight: 500;
    font-size: 14px;
    line-height: 1.35;
    color: var(--ink);
  }
  .menu-row .pfc {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
  }
  .menu-row .pfc .label-jp {
    font-weight: 400;
  }
  .menu-row .right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .menu-row .kcal {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 14px;
    color: var(--ink);
    min-width: 56px;
    text-align: right;
  }
  .menu-row .kcal .u {
    font-size: 10px;
    color: var(--muted);
    font-weight: 400;
    margin-left: 2px;
  }
  .menu-row .check {
    width: 18px; height: 18px;
    border: 1px solid var(--line-strong);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .menu-row.selected .check {
    background: var(--ink);
    border-color: var(--ink);
  }
  .menu-row .check svg {
    width: 11px; height: 11px;
    color: white;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .menu-row.selected .check svg { opacity: 1; }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 13px;
  }

  /* ===== Right column - Total card (PC) ===== */
  .total-card-pc {
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 22px;
    background: var(--bg);
  }
  .total-card-pc .label {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .total-card-pc .count-line {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .total-card-pc .kcal-big {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 52px;
    line-height: 1;
    letter-spacing: -0.025em;
    margin-bottom: 4px;
  }
  .total-card-pc .kcal-big .u {
    font-size: 14px;
    color: var(--muted);
    font-weight: 400;
    margin-left: 6px;
    letter-spacing: 0;
  }
  .total-card-pc .divider {
    border: none;
    border-top: 1px solid var(--line);
    margin: 20px 0 16px;
  }
  .nutri-list {
    display: flex;
    flex-direction: column;
    gap: 11px;
    margin-bottom: 20px;
  }
  .nutri-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .nutri-row .name {
    font-size: 13px;
    color: var(--ink);
  }
  .nutri-row .value {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 15px;
  }
  .nutri-row .value .u {
    font-size: 11px;
    color: var(--muted);
    font-weight: 400;
    margin-left: 2px;
  }
  .clear-btn-pc {
    width: 100%;
    background: transparent;
    border: 1px solid var(--line-strong);
    border-radius: 4px;
    padding: 9px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.15s;
  }
  .clear-btn-pc:hover:not(:disabled) {
    border-color: var(--ink);
    background: var(--ink);
    color: white;
  }
  .clear-btn-pc:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  /* ===== Bottom total bar (Mobile only) ===== */
  .total-card-mobile {
    display: none;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg);
    border-top: 1px solid var(--line-strong);
    padding: 14px 20px 16px;
    z-index: 10;
    box-shadow: 0 -8px 24px rgba(0,0,0,0.04);
  }
  @media (max-width: 900px) {
    .total-card-mobile { display: block; }
  }
  .total-card-mobile .top {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 12px;
  }
  .total-card-mobile .meta {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .total-card-mobile .label {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .total-card-mobile .count {
    font-size: 11px;
    color: var(--muted);
  }
  .total-card-mobile .kcal-num {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 32px;
    line-height: 1;
    letter-spacing: -0.025em;
  }
  .total-card-mobile .kcal-num .u {
    font-size: 12px;
    color: var(--muted);
    font-weight: 400;
    margin-left: 4px;
  }
  .total-card-mobile .nutrients {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto;
    gap: 12px;
    align-items: center;
    padding-top: 12px;
    border-top: 1px solid var(--line);
  }
  .total-card-mobile .n-cell {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .total-card-mobile .n-cell .n-l {
    font-size: 10px;
    color: var(--muted);
    font-weight: 500;
  }
  .total-card-mobile .n-cell .n-v {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 14px;
  }
  .total-card-mobile .n-cell .n-v .u {
    font-size: 10px;
    color: var(--muted);
    font-weight: 400;
    margin-left: 1px;
  }
  .total-card-mobile .clear-btn-m {
    background: transparent;
    border: 1px solid var(--line-strong);
    border-radius: 4px;
    padding: 6px 12px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 500;
    color: var(--ink);
    cursor: pointer;
  }
  .total-card-mobile .clear-btn-m:disabled {
    opacity: 0.3;
  }

  /* ===== Footer ===== */
  .footer {
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid var(--line);
    font-size: 11px;
    color: var(--muted);
    line-height: 1.7;
  }
  .footer a { color: var(--muted); text-decoration: underline; }
</style>
</head>

const state = { genre: 'burger', search: '', selected: new Map() };

function getKey(genre, name) { return `${genre}|${name}`; }

function renderGenreTabs() {
  const tabs = document.getElementById('genreTabs');
  tabs.innerHTML = '';
  MENU_DATA.genres.forEach(g => {
    const count = (MENU_DATA.items[g.id] || []).length;
    const b = document.createElement('button');
    b.className = 'genre-tab' + (g.id === state.genre ? ' active' : '');
    b.innerHTML = `${g.name}<span class="num">${count}</span>`;
    b.addEventListener('click', () => {
      state.genre = g.id;
      state.search = '';
      document.getElementById('searchInput').value = '';
      renderGenreTabs();
      renderMenu();
    });
    tabs.appendChild(b);
  });
}

const CHECK_SVG = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 8 3.5 3.5L13 5"/></svg>';

function renderMenu() {
  const stack = document.getElementById('menuStack');
  stack.innerHTML = '';
  const items = MENU_DATA.items[state.genre] || [];
  const filtered = state.search
    ? items.filter(it => it.n.toLowerCase().includes(state.search.toLowerCase()))
    : items;

  if (filtered.length === 0) {
    stack.innerHTML = `<div class="empty-state">該当するメニューがありません</div>`;
    return;
  }

  const frag = document.createDocumentFragment();
  filtered.forEach(item => {
    const key = getKey(state.genre, item.n);
    const isSelected = state.selected.has(key);
    const div = document.createElement('div');
    div.className = 'menu-row' + (isSelected ? ' selected' : '');
    div.innerHTML = `
      <div class="check">${CHECK_SVG}</div>
      <div class="info">
        <div class="name">${item.n}</div>
        <div class="pfc">たんぱく質 ${item.p}g · 脂質 ${item.f}g · 炭水化物 ${item.c}g</div>
      </div>
      <div class="right">
        <div class="kcal">${item.k}<span class="u">kcal</span></div>
      </div>
    `;
    div.addEventListener('click', () => toggleSelect(item, key));
    frag.appendChild(div);
  });
  stack.appendChild(frag);
}

function toggleSelect(item, key) {
  if (state.selected.has(key)) state.selected.delete(key);
  else state.selected.set(key, { ...item, key });
  renderMenu();
  updateTotals();
}

function clearSelection() {
  state.selected.clear();
  renderMenu();
  updateTotals();
}

function updateTotals() {
  let k=0, p=0, f=0, c=0;
  state.selected.forEach(it => { k+=it.k; p+=it.p; f+=it.f; c+=it.c; });
  const kRounded = Math.round(k);
  const pStr = p.toFixed(1);
  const fStr = f.toFixed(1);
  const cStr = c.toFixed(1);
  const count = state.selected.size;

  // PC側
  animateNum('kcalPc', kRounded);
  document.getElementById('pPc').textContent = pStr;
  document.getElementById('fPc').textContent = fStr;
  document.getElementById('cPc').textContent = cStr;
  document.getElementById('selCountPc').textContent = count;
  document.getElementById('clearBtnPc').disabled = count === 0;

  // モバイル側
  animateNum('kcalM', kRounded);
  document.getElementById('pM').textContent = pStr;
  document.getElementById('fM').textContent = fStr;
  document.getElementById('cM').textContent = cStr;
  document.getElementById('selCountM').textContent = count;
  document.getElementById('clearBtnM').disabled = count === 0;
}

function animateNum(id, target) {
  const el = document.getElementById(id);
  const start = parseInt(el.textContent.replace(/,/g,'')) || 0;
  const dur = 280;
  const t0 = performance.now();
  function step(t) {
    const pr = Math.min((t - t0) / dur, 1);
    el.textContent = Math.round(start + (target - start) * pr);
    if (pr < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

let searchTimer;
document.getElementById('searchInput').addEventListener('input', (e) => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    state.search = e.target.value;
    renderMenu();
  }, 120);
});

document.getElementById('clearBtnPc').addEventListener('click', clearSelection);
document.getElementById('clearBtnM').addEventListener('click', clearSelection);

renderGenreTabs();
renderMenu();
updateTotals();
</script>
